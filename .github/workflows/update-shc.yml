name: Update Sindh High Court judgments

# Runs daily at 03:00 UTC (~8am Pakistan time). Can also be triggered
# manually from the Actions tab ("Run workflow") to test it immediately.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        run: python update_shc.py

      - name: Commit new judgments (if any)
        run: |
          git config user.name "PLR Auto-Update Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit." && exit 0

          git commit -m "Auto-update: new SHC judgments $(date +'%Y-%m-%d')"

          # If someone else pushed to the repo while this was running (e.g.
          # a manual file upload), pull their changes in and retry instead
          # of failing outright.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) - pulling latest changes and retrying..."
            git pull --rebase --strategy-option=ours
            sleep 5
          done

          echo "Failed to push after 3 attempts."
          exit 1
