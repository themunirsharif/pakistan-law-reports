name: Reclassify General topics

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reclassify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reclassify topics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python reclassify_topics.py

      - name: Commit changes (if any)
        run: |
          git config user.name "PLR Auto-Update Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-reclassify General topics"
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) - pulling latest changes and retrying..."
            git pull --rebase --strategy-option=ours
            sleep 5
          done
          echo "Failed to push after 3 attempts."
          exit 1
